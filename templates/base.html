<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "Personal Wiki" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <a href="{{ url_for('home') }}">Personal Wiki</a>
    <form action="{{ url_for('wiki_page', slug='새_문서') }}" method="get">
      <button type="submit">새 문서</button>
    </form>
  </header>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul class="flash">
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
