{% extends "base.html" %}
{% block content %}
<article>
  <h1>{{ page['title'] }}</h1>
  <div class="wiki-body">{{ rendered|safe }}</div>
  <p><a href="{{ url_for('edit_page', slug=page['slug']) }}">수정</a></p>
</article>
<section>
  <h2>최근 리비전</h2>
  <ul>
  {% for rev in revisions %}
    <li><a href="{{ url_for('revision_detail', revision_id=rev['id']) }}">#{{ rev['id'] }}</a> {{ rev['created_at'] }}</li>
  {% endfor %}
  </ul>
</section>
{% endblock %}
